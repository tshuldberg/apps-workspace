app = "marlin-ws-gateway"
primary_region = "iad"

[build]
  builder = "dockerfile"

[env]
  NODE_ENV = "production"
  WS_PORT = "4001"

[http_service]
  internal_port = 4001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["app"]

[http_service.concurrency]
  type = "connections"
  hard_limit = 500
  soft_limit = 250

[http_service.machine_checks]
  grace_period = "30s"

# Auto-scaling: min 1, max 3 machines
[[services.autoscaling]]
  min_machines = 1
  max_machines = 3
